<!doctype html>

<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css" />
  </head>
  <body>
    <p class="calculation"></p>
    <button class="numbers" onclick="updateCalculation(`1`)">1</button>

    <button class="numbers" onclick="updateCalculation(`2`)">2</button>

    <button class="numbers" onclick="updateCalculation(`3`)">3</button>

    <button class="operation" onclick="updateCalculation(`+`)">+</button>

    <p></p>

    <button class="numbers" onclick="updateCalculation(`4`)">4</button>

    <button class="numbers" onclick="updateCalculation(`5`)">5</button>

    <button class="numbers" onclick="updateCalculation(`6`)">6</button>

    <button class="operation minusmal" onclick="updateCalculation(`-`)">
      -
    </button>

    <p></p>

    <button class="numbers" onclick="updateCalculation(`7`)">7</button>

    <button class="numbers" onclick="updateCalculation(`8`)">8</button>

    <button class="numbers" onclick="updateCalculation(`9`)">9</button>

    <button class="operation minusmal" onclick="updateCalculation(`*`)">
      *
    </button>

    <p></p>

    <button class="numbers" onclick="updateCalculation(`0`)">0</button>

    <button class="numbers punkt" onclick="updateCalculation(`.`)">.</button>

    <button
      class="numbers gleich"
      onclick="
        calculation = eval(calculation);
        localStorage.setItem('calculation', JSON.stringify(calculation));
        console.log(calculation);
        document.querySelector('.calculation').innerHTML = calculation;
      "
    >
      =
    </button>

    <button class="operation geteilt" onclick="updateCalculation(`/`)">
      /
    </button>

    <p></p>

    <button
      class="numbers clear"
      onclick="
        calculation = '';
        localStorage.setItem('calculation', JSON.stringify(calculation));
        console.log('Cleared');
        document.querySelector('.calculation').innerHTML = calculation;
      "
    >
      clear
    </button>

    <script src="calculator.js"></script>
  </body>
</html>
